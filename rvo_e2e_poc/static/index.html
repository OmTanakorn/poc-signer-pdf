<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWC RVO E2E POC</title>
    <script src="/lib/webviewer.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f4f4f9; }
        .header {
            padding: 12px 20px;
            background: #002b49;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h2 { font-size: 18px; flex: 1; }
        button {
            padding: 8px 18px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-gen  { background: #ffc107; color: #000; }
        .btn-gen:hover:not(:disabled)  { background: #e0a800; }
        .btn-save { background: #00b140; color: #fff; }
        .btn-save:hover:not(:disabled) { background: #008a32; }
        #status { font-size: 13px; color: #cce; min-width: 200px; }
        #viewer { width: 100%; height: calc(100vh - 56px); }
    </style>
</head>
<body>
    <div class="header">
        <h2>RVO Generator &amp; Signer (E2E POC)</h2>
        <span id="status">Click "Generate PDF" to start</span>
        <button class="btn-gen" id="gen-btn" onclick="generatePDF()">1. Generate New PDF</button>
        <button class="btn-save" id="save-btn" disabled onclick="saveSignature()">2. Save Signature</button>
    </div>
    <div id="viewer"></div>

    <script>
        let annotationManager = null;

        async function generatePDF() {
            const btn = document.getElementById('gen-btn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.textContent = "⏳ Generating PDF...";

            const res = await fetch('/api/generate-pdf', { method: 'POST' });
            if (!res.ok) {
                status.textContent = "❌ Generation failed!";
                btn.disabled = false;
                return;
            }

            status.textContent = "✅ PDF ready. Loading viewer...";
            btn.disabled = false;
            initViewer();
        }

        function initViewer() {
            const viewerEl = document.getElementById('viewer');
            viewerEl.innerHTML = "";

            WebViewer({
                path: '/lib/public',
                initialDoc: '/api/document',
            }, viewerEl).then(async instance => {
                const { documentViewer, annotationManager: am, Annotations } = instance.Core;
                annotationManager = am;

                documentViewer.addEventListener('documentLoaded', async () => {
                    const status = document.getElementById('status');
                    status.textContent = "⏳ Loading annotations...";

                    try {
                        const res = await fetch('/api/xfdf');
                        const data = await res.json();
                        if (data.xfdf_payload) {
                            // โหลดลายเซ็นที่บันทึกไว้
                            await annotationManager.importAnnotations(data.xfdf_payload);
                            status.textContent = "✅ Signature loaded";
                        } else {
                            // PDF มี AcroForm Sig field ฝังอยู่แล้ว — ไม่ต้อง inject อะไรเพิ่ม
                            status.textContent = "📝 คลิกกล่องเซ็นชื่อเพื่อเซ็น";
                        }
                    } catch (err) {
                        console.error('[POC] Error:', err);
                        status.textContent = "⚠️ Error: " + err.message;
                    }

                    document.getElementById('save-btn').disabled = false;
                });
            });
        }

        async function saveSignature() {
            const btn = document.getElementById('save-btn');
            const status = document.getElementById('status');
            if (!annotationManager) return;

            btn.disabled = true;
            status.textContent = "⏳ Saving...";

            // ── 1. Export XFDF (annotation/signature data) ──────────────────
            const xfdfString = await annotationManager.exportAnnotations();

            console.group('📄 SAVE: แยก PDF vs XFDF');

            console.log('━━━ [XFDF] ข้อมูลลายเซ็น (XML) ━━━');
            console.log(xfdfString);   // แสดง XML เต็มๆ ของลายเซ็น

            // ── 2. แสดงขนาด PDF ต้นฉบับจาก server ──────────────────────────
            const pdfRes = await fetch('/api/document');
            const pdfBuffer = await pdfRes.arrayBuffer();
            console.log('━━━ [PDF] ไฟล์ต้นฉบับ (Binary) ━━━');
            console.log(`  ขนาด: ${(pdfBuffer.byteLength / 1024).toFixed(1)} KB`);
            console.log('  → PDF ไม่มีข้อมูลลายเซ็นอยู่ภายใน (มีแค่ AcroForm Widget โครงสร้าง)');
            console.log('  → ลายเซ็นจริงอยู่ใน XFDF ด้านบนเท่านั้น');

            console.groupEnd();

            // ── 3. Save XFDF ไปยัง Backend ──────────────────────────────────
            const res = await fetch('/api/xfdf', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ xfdf_payload: xfdfString })
            });

            if (res.ok) {
                status.textContent = "✅ Signature saved to Space!";
                console.log('✅ XFDF saved to backend (space/signature.xfdf)');
            } else {
                status.textContent = "❌ Save failed!";
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
