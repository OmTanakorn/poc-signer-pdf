<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: A4; margin: 2cm; }
        body { font-family: sans-serif; padding: 20px; }
        h1 { color: #002b49; border-bottom: 2px solid #002b49; padding-bottom: 10px; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .data-table th { background: #f0f4f8; }
        .signature-box {
            margin-top: 80px;
            text-align: left;
            padding-left: 0;
        }
        .sig-line {
            display: inline-block;
            width: 220px;
            border-bottom: 1px solid #000;
            margin-bottom: 4px;
            height: 40px;
        }
        .sig-label { font-size: 11px; color: #444; }
    </style>
</head>
<body>
    <h1>AWC RVO Report</h1>
    <table class="data-table">
        <tr><th>RVO Number</th><td>{{ rvo_number }}</td></tr>
        <tr><th>Project</th><td>{{ project_name }}</td></tr>
        <tr><th>Amount</th><td>{{ amount }} THB</td></tr>
    </table>

    <div class="signature-box">
        <div class="sig-line"></div><br>
        <span class="sig-label">Authorized Executive</span>
    </div>
</body>
</html>
