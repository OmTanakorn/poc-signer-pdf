<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWC RVO - Apryse POC</title>
    <script src="/lib/webviewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f9; }
        .header { padding: 15px; background: #002b49; color: white; display: flex; justify-content: space-between; align-items: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #00b140; color: white; border: none; border-radius: 4px; }
        button:hover { background: #008a32; }
        #viewer { width: 100%; height: calc(100vh - 65px); }
    </style>
</head>
<body>

    <div class="header">
        <h2>RVO Signature Playground (FastAPI)</h2>
        <button id="save-btn">💾 Save Signature to Space</button>
    </div>

    <div id="viewer"></div>

    <script>
        // เริ่มต้น Apryse WebViewer
        WebViewer({
            path: '/lib/public', // ชี้ไปที่โฟลเดอร์ที่มี core/ และ ui/ (node_modules/@pdftron/webviewer/public)
        }, document.getElementById('viewer')).then(async instance => {
            const { documentViewer, annotationManager } = instance.Core;

            // 1. โหลด PDF ต้นฉบับจาก FastAPI
            instance.UI.loadDocument('/api/document');

            // 2. เมื่อ PDF โหลดเสร็จ ให้ดึง XFDF มาแปะทับ (Merge)
            documentViewer.addEventListener('documentLoaded', async () => {
                console.log("PDF Loaded. Fetching XFDF...");
                const response = await fetch('/api/xfdf');
                const data = await response.json();

                if (data.xfdf_payload) {
                    // นำ XFDF XML String มาร่ายเวทมนตร์แปะลง PDF
                    await annotationManager.importAnnotations(data.xfdf_payload);
                    console.log("XFDF Annotations merged!");
                }
            });

            // 3. ผูก Event ปุ่ม Save
            document.getElementById('save-btn').addEventListener('click', async () => {
                const btn = document.getElementById('save-btn');
                btn.innerText = "Saving...";

                // ดึงข้อมูลลายเซ็น/การขีดเขียนทั้งหมดออกมาเป็น XFDF String
                const xfdfString = await annotationManager.exportAnnotations();

                // ส่ง POST ไปให้ FastAPI เซฟลง Space
                const saveRes = await fetch('/api/xfdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ xfdf_payload: xfdfString })
                });

                if(saveRes.ok) {
                    btn.innerText = "✅ Saved!";
                    setTimeout(() => btn.innerText = "💾 Save Signature to Space", 2000);
                }
            });
        });
    </script>
</body>
</html>
